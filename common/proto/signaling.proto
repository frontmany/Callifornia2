syntax = "proto3";

package sfu;

// -----------------------------------------------------------------------------
// Сервис SFU, который предоставляет Signaling сервер
// -----------------------------------------------------------------------------
service SFUService {
    // --- Управление жизненным циклом пира (Signaling -> SFU) ---
    // Вызывается, когда клиент подключился к Signaling и готов к звонку.
    // SFU создаёт внутреннюю структуру Peer, но WebRTC соединение ещё не установлено.
    rpc CreatePeer(CreatePeerRequest) returns (CreatePeerResponse);
    
    // Вызывается, когда клиент отключился от Signaling или покинул комнату.
    // SFU закрывает PeerConnection и освобождает ресурсы.
    rpc DeletePeer(DeletePeerRequest) returns (DeletePeerResponse);
    
    // --- WebRTC сигналинг (Signaling -> SFU) ---
    // Signaling передаёт SDP offer/answer от клиента в SFU.
    // SFU обрабатывает и возвращает ответный SDP (синхронно).
    rpc HandleSDP(HandleSDPRequest) returns (HandleSDPResponse);
    
    // Signaling передаёт ICE кандидата от клиента в SFU.
    rpc AddICECandidate(AddICECandidateRequest) returns (AddICECandidateResponse);
    
    // --- События от SFU к Signaling (server streaming) ---
    // Signaling подписывается на этот стрим при старте.
    // SFU через него отправляет все асинхронные события: потерю соединения, появление треков, ошибки.
    rpc SubscribeEvents(SubscribeEventsRequest) returns (stream SFUEvent);

    // Лёгкий health-check для мониторинга доступности SFU.
    rpc Ping(PingRequest) returns (PingResponse);
}

// -----------------------------------------------------------------------------
// Сообщения для управления пирами
// -----------------------------------------------------------------------------
message CreatePeerRequest {
    string room_id = 1;
    string participant_id = 2; // Логический участник (например nickname); в системе глобально уникален (резерв в Redis)
    string signaling_id = 3; // Идентификатор инстанса Signaling (для мульти-инстанса на SFU)
}

message CreatePeerResponse {
    bool success = 1;
    optional string error_message = 2; // Если success=false
}

message DeletePeerRequest {
    string room_id = 1;
    string participant_id = 2;
    string reason = 3; // "user_left", "signaling_disconnected", etc.
}

message DeletePeerResponse {
    bool success = 1;
    optional string error_message = 2; // Если success=false
}

// -----------------------------------------------------------------------------
// Сообщения для WebRTC сигналинга
// -----------------------------------------------------------------------------
enum SdpType {
    SDP_TYPE_UNSPECIFIED = 0; // Не задавать явно
    SDP_TYPE_OFFER = 1;
    SDP_TYPE_ANSWER = 2;
}

message HandleSDPRequest {
    string room_id = 1;
    string participant_id = 2;
    string sdp = 3; // Полный SDP текст
    SdpType type = 4; // offer или answer
}

message HandleSDPResponse {
    string sdp = 1; // Ответный SDP (answer или offer)
    SdpType type = 2; // answer или offer
    bool success = 3;
    optional string error_message = 4;
}

message AddICECandidateRequest {
    string room_id = 1;
    string participant_id = 2;
    string candidate = 3; // Строка ICE кандидата
    string sdp_mid = 4;
}

message AddICECandidateResponse {
    bool success = 1;
    optional string error_message = 2;
}

// -----------------------------------------------------------------------------
// Подписка на события от SFU
// -----------------------------------------------------------------------------
message SubscribeEventsRequest {
    // Можно передать идентификатор Signaling инстанса, если их несколько
    string signaling_id = 1;
}

// Ping: пустой запрос, в ответе только ok.
message PingRequest {}

message PingResponse {
    bool ok = 1;
}

// -----------------------------------------------------------------------------
// События, которые SFU отправляет Signaling (через server streaming)
// -----------------------------------------------------------------------------
// Событие от SFU к Signaling: участник в комнате (room_id + participant_id) + полезная нагрузка.
message SFUEvent {
    string room_id = 1;
    string participant_id = 2;

    oneof detail {
        PeerConnectedEvent peer_connected = 3;
        PeerDisconnectedEvent peer_disconnected = 4;
        TrackAddedEvent track_added = 5;
        TrackRemovedEvent track_removed = 6;
        ICECandidateEvent ice_candidate = 7;
        ErrorEvent error = 8;
    }
}

// Когда WebRTC соединение между SFU и клиентом полностью установлено (ICE done).
// Идентификаторы — в корне SFUEvent (поля room_id, participant_id).
message PeerConnectedEvent {
    string transport_type = 1; // "udp", "tcp", "relay"
}

// Когда SFU теряет WebRTC соединение с клиентом (ICE timeout, закрытие, сетевые проблемы).
message PeerDisconnectedEvent {
    string reason = 1; // "timeout", "ice_failed", "closed", "network_error"
}

// Когда SFU получает новый медиа-трек от клиента (первый RTP пакет).
message TrackAddedEvent {
    string track_id = 1;
    string kind = 2; // "video" или "audio"
    string codec = 3; // "H264", "VP8", "Opus"
    bool is_sending = 4; // true — клиент отправляет медиа по этому треку
}

// Когда клиент перестаёт отправлять трек (выключил камеру/микрофон или закрыл дорожку).
message TrackRemovedEvent {
    string track_id = 1;
    string kind = 2;
    string reason = 3; // "user_muted", "track_ended", "peer_disconnected"
}

// Когда SFU генерирует ICE кандидата (в ответ на offer от клиента).
message ICECandidateEvent {
    string candidate = 1;
    string sdp_mid = 2;
}

// Любая ошибка, которую SFU хочет сообщить Signaling.
message ErrorEvent {
    string error_code = 1; // "NO_COMMON_CODEC", "ICE_FAILED", "RESOURCE_EXHAUSTED"
    string error_message = 2;
    bool is_fatal = 3;
}

