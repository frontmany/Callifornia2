syntax = "proto3";

package room_manager;

// -----------------------------------------------------------------------------
// Плоскость управления комнатами: Signaling → Room Manager (выдача SFU, очередь).
// -----------------------------------------------------------------------------
service RoomManagerService {
    // Получить привязку комнаты к SFU или поставить в очередь, если мест нет.
    // Ошибки перегрузки (очередь полна) — через gRPC Status, не через поля ответа.
    rpc GetRoom(GetRoomRequest) returns (GetRoomResponse);

    // Закрыть комнату: снять привязку и уменьшить нагрузку на инстанс SFU.
    rpc CloseRoom(CloseRoomRequest) returns (CloseRoomResponse);

    // Снимок инстансов SFU и счётчиков (для health / мониторинга).
    rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
}

enum RoomBindingStatus {
    UNSPECIFIED = 0; // Не использовать как семантику — значение по умолчанию в proto3
    ASSIGNED = 1;    // Комната назначена на SFU, можно подключаться по sfu_grpc_addr
    PENDING = 2;     // Ожидание вместимости или выделения SFU
    NOT_FOUND = 3;   // Комнаты нет (и create_if_missing = false)
}

message GetRoomRequest {
    string room_id = 1;
    // Владелец сессии на стороне Signaling (идентификатор инстанса / процесса).
    string signaling_owner_id = 2;
    string signaling_owner_host = 3;
    uint32 signaling_owner_port = 4;
    // Если true — создать привязку или поставить в очередь; иначе только поиск.
    bool create_if_missing = 5;
}

message GetRoomResponse {
    RoomBindingStatus status = 1;
    string room_id = 2;
    string sfu_instance_id = 3;
    string sfu_grpc_addr = 4;
    // Эхо владельца из запроса или из сохранённой привязки.
    string signaling_owner_id = 5;
    string signaling_owner_host = 6;
    uint32 signaling_owner_port = 7;
    // Логическое состояние, напр. "active", "allocating".
    string room_state = 8;
}

message CloseRoomRequest {
    string room_id = 1;
}

message CloseRoomResponse {
    bool closed = 1; // true, если привязка была и удалена
}

message GetStatusRequest {}

message SfuStatus {
    string instance_id = 1;
    string grpc_addr = 2;
    uint32 max_rooms = 3;
    uint32 current_rooms = 4;
    bool alive = 5;
    int64 last_ping_unix = 6;
    // true — инстанс занесён при динамическом резервировании из пула (очередь без ёмкости);
    // false — заранее известный SFU в статическом инвентаре.
    bool provisioned = 7;
}

message GetStatusResponse {
    repeated SfuStatus sfu_instances = 1;
    uint32 active_rooms = 2;
    uint32 pending_requests = 3;
}
