map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream connector_upstream {
    server connector:8090;
}

upstream signaling_upstream {
    server signaling:8080;
}

server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /ws {
        proxy_pass http://signaling_upstream/ws;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /health {
        proxy_pass http://connector_upstream/health;
    }

    location ~ ^/(auth|create|join|logout|session/renew)$ {
        proxy_pass http://connector_upstream;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
