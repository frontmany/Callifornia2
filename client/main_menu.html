            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);

<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-xl py-md sticky top-0 z-40 bg-surface/70 backdrop-blur-xl border-b border-white/20 shadow-lg shadow-black/5">
<div class="flex items-center gap-sm">

<span class="font-display text-h2 font-extrabold text-primary italic">Callifornia</span>
</div>
<div class="flex items-center gap-md">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-white/20 transition-colors duration-200 active:scale-95">
<span class="material-symbols-outlined">light_mode</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-white/20 transition-colors duration-200 active:scale-95">
<span class="material-symbols-outlined">settings</span>
</button>
<img alt="User profile" class="w-10 h-10 rounded-full border border-white/40 object-cover" data-alt="Close up portrait of a young woman with natural makeup, smiling softly. Professional corporate headshot style lighting. Light mode aesthetic with soft background blur." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAlvx3A0ZHWwaljA02pWMjL-ViZeUE2w8Lo9GShm_32rrzm_nGS627k5XD0vjqoVX0-AZvvtCHnLffGTZ-pa7R0d0Q2RXT54VCUvo7K85SIo5A8Qg4yLvWtPwJCNAPt32NLIlqsmeU4FaeZowD3X6LlI1xjqnR2g7SGplLbMiNvUxhhAJPCrSecx-LoHrffMfQ7YMoLRzyTZ2SyHQRKp8Gz-5icZLVwbEtnOeWgbSTriE5sg9xXm1GrcHyQYZG2SdTOcbQElYq2ckUh"/>
</div>
</header>

<div class="text-center mb-2xl">
<h1 class="font-h1 text-h1 text-on-surface mb-sm">Ready to connect?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Start a new space or drop into an existing one.</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg w-full max-w-4xl">
<!-- Create Room Card -->
<button class="glass-card rounded-[24px] p-2xl flex flex-col items-center justify-center gap-lg group hover:-translate-y-2 transition-transform duration-300 text-left w-full">
<div class="w-24 h-24 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">add</span>
</div>
<div class="text-center mt-md">
<h2 class="font-h2 text-h2 text-on-surface mb-xs">Create Room</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Start a fresh session and invite your team.</p>
</div>
</button>
<!-- Join Room Card -->
<button class="glass-card rounded-[24px] p-2xl flex flex-col items-center justify-center gap-lg group hover:-translate-y-2 transition-transform duration-300 text-left w-full">
<div class="w-24 h-24 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">login</span>
</div>
<div class="text-center mt-md">
<h2 class="font-h2 text-h2 text-on-surface mb-xs">Join Room</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Enter a link or code to hop right in.</p>
</div>
</button>
</div>

<button class="flex items-center gap-sm px-lg py-md rounded-full bg-white/40 backdrop-blur-md border border-white/60 text-secondary hover:bg-white/60 transition-colors shadow-sm font-button text-button">
